[env:esp32-s3-devkitc-1]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino

; การตั้งค่าพื้นฐาน
upload_speed = 921600
monitor_speed = 115200

board_build.partitions = min_spiffs.csv

lib_ldf_mode = deep

lib_deps =
    ; จอ E-Ink
    zinggjm/GxEPD2 @ ^1.5.8
    adafruit/Adafruit GFX Library @ ^1.11.9
    
    ; เซนเซอร์
    https://github.com/fu-hsi/PMS.git
    adafruit/Adafruit BME280 Library @ ^2.2.4
    adafruit/Adafruit Unified Sensor @ ^1.1.14
    https://github.com/sparkfun/SparkFun_Indoor_Air_Quality_Sensor-ENS160_Arduino_Library.git
    
    ; OTA (ใช้ตัวที่ Fork มาเพื่อ ESP32-S3 โดยเฉพาะ จะไม่ตีกับ Library อื่น)
    https://github.com/mathieucarbou/ESPAsyncWebServer.git
    https://github.com/mathieucarbou/AsyncTCP.git
    ayushsharma82/ElegantOTA @ ^3.1.1



build_flags = 
    -D ELEGANTOTA_USE_ASYNC_WEBSERVER=1
    -fpermissive

[env:esp32dev]
platform = espressif32
board = esp32dev       
framework = arduino

upload_speed = 921600
monitor_speed = 115200
board_build.partitions = min_spiffs.csv

lib_ldf_mode = deep

lib_deps =
    ; จอ E-Ink
    zinggjm/GxEPD2 @ ^1.5.8
    adafruit/Adafruit GFX Library @ ^1.11.9
    
    ; เซนเซอร์
    https://github.com/fu-hsi/PMS.git
    adafruit/Adafruit BME280 Library @ ^2.2.4
    adafruit/Adafruit Unified Sensor @ ^1.1.14
    https://github.com/sparkfun/SparkFun_Indoor_Air_Quality_Sensor-ENS160_Arduino_Library.git
    
    ; OTA (ใช้ตัวที่ Fork มาเพื่อ ESP32-S3 โดยเฉพาะ จะไม่ตีกับ Library อื่น)
    https://github.com/mathieucarbou/ESPAsyncWebServer.git
    https://github.com/mathieucarbou/AsyncTCP.git
    ayushsharma82/ElegantOTA @ ^3.1.1



build_flags = 
    -D ELEGANTOTA_USE_ASYNC_WEBSERVER=1
    -fpermissive

